name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: pnpm build
        working-directory: web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: internal/server/assets/index.html

  build:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: windows-amd64
            ext: .exe
            goos: windows
            goarch: amd64
          - suffix: windows-arm64
            ext: .exe
            goos: windows
            goarch: arm64
          - suffix: macos-arm64
            ext: ''
            goos: darwin
            goarch: arm64
          - suffix: macos-amd64
            ext: ''
            goos: darwin
            goarch: amd64
          - suffix: linux-amd64
            ext: ''
            goos: linux
            goarch: amd64
          - suffix: linux-arm64
            ext: ''
            goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: internal/server/assets/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X github.com/lirrensi/looty/internal/server.Version=${{ github.ref_name }}" -o looty-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/blip

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: looty-${{ matrix.suffix }}
          path: looty-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create install script
        run: |
          cat > install.sh << 'SCRIPT'
          #!/bin/sh
          set -e
          ARCH="$(uname -m | sed -e 's/x86_64/amd64/' -e 's/aarch64/arm64/')"
          OS="$(uname | sed -e 's/Darwin/macos/' -e 's/Linux/linux/')"
          BIN="looty-${OS}-${ARCH}"
          curl -L -o looty "https://github.com/lirrensi/looty/releases/latest/download/${BIN}"
          chmod +x looty
          mkdir -p ~/.local/bin
          mv looty ~/.local/bin/
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.profile
          echo "Installed! Run 'looty' (restart terminal)"
          SCRIPT
          chmod +x install.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
            install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}