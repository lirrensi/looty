# Release Workflow
# 
# ⚠️  CRITICAL: This workflow MUST create a GitHub Release when triggered.
# If you modify this file, ensure the release step still works.
#
# HOW IT WORKS:
# 1. Tag pushed (e.g., v1.4.0) → triggers this workflow
# 2. Workflow builds binaries for all platforms
# 3. softprops/action-gh-release creates the GitHub Release
#
# ⚠️  NEVER set `tag_name` manually in the release step!
# The action auto-detects it from the git ref (e.g., refs/tags/v1.4.0).
# Setting tag_name="1.4.0" when the git tag is "v1.4.0" will SILENTLY FAIL.
#
# TROUBLESHOOTING:
# - If workflow succeeds but no release appears, check the release step logs
# - Common cause: tag_name mismatch between git tag and workflow config
#
# For full release instructions, see AGENTS.md and README.md

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: pnpm build
        working-directory: web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: internal/server/assets/index.html

  build:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: windows-amd64
            ext: .exe
            goos: windows
            goarch: amd64
            archive: zip
          - suffix: windows-arm64
            ext: .exe
            goos: windows
            goarch: arm64
            archive: zip
          - suffix: macos-arm64
            ext: ''
            goos: darwin
            goarch: arm64
            archive: tar.gz
          - suffix: macos-amd64
            ext: ''
            goos: darwin
            goarch: amd64
            archive: tar.gz
          - suffix: linux-amd64
            ext: ''
            goos: linux
            goarch: amd64
            archive: tar.gz
          - suffix: linux-arm64
            ext: ''
            goos: linux
            goarch: arm64
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: internal/server/assets/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X github.com/lirrensi/looty/internal/server.Version=${{ steps.version.outputs.VERSION }}" -o looty${{ matrix.ext }} ./cmd/blip

      - name: Create archive
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip looty-${{ matrix.suffix }}.zip looty${{ matrix.ext }}
          else
            tar -czf looty-${{ matrix.suffix }}.tar.gz looty
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: looty-${{ matrix.suffix }}.${{ matrix.archive == 'zip' && 'zip' || 'tar.gz' }}
          path: looty-${{ matrix.suffix }}.${{ matrix.archive == 'zip' && 'zip' || 'tar.gz' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: looty-*
          merge-multiple: true

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # ⚠️  DO NOT ADD `tag_name` HERE! The action auto-detects from the git ref.
      # Adding tag_name="1.4.0" when git tag is "v1.4.0" will cause silent failure.
      # See the comment at the top of this file for details.
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          name: Looty ${{ steps.version.outputs.VERSION }}