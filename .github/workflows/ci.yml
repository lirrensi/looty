name: CI

# Run on every push to main and all PRs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip if only non-code files changed
paths:
  - '**.go'
  - 'go.mod'
  - 'go.sum'
  - 'web/**'
  - 'embed/**'
  - 'Makefile'
  - '.github/workflows/ci.yml'

jobs:
  # Test frontend build
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Build frontend
        run: |
          cd web
          npm run build

  # Test Go build for all platforms
  build:
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend

      - name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o looty ./cmd/blip
